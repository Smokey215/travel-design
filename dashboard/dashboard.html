<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-200 flex min-h-screen overflow-x-hidden">
    <div
      id="overlay"
      class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 lg:hidden"
    ></div>
    <!-- Aside -->
    <aside
      id="sidebar"
      class="fixed lg:static top-0 left-[-100%] lg:left-0 z-50 w-72 lg:w-1/6 sm:w-1/3 h-screen bg-[#0B132B] flex flex-col duration-300"
    >
      <div class="flex items-center justify-between bg-black p-4">
        <nav class="text-white font-semibold text-2xl">📱 Mobile Shop</nav>

        <!-- Close Button -->
        <button id="closeButton" class="text-white text-3xl lg:hidden">
          ✕
        </button>
      </div>
      <div class="h-screen flex flex-col justify-between">
        <div class="grid grid-cols-1 px-4 space-y-4 pt-5">
          <span class="text-sm text-white opacity-50">MANAGEMENT</span>

          <span
            class="p-3 w-full text-white font-semibold text-xl rounded-xl hover:bg-gradient-to-r from-[#C026D3] to-[#D946EF]"
          >
            Dashboard
          </span>

          <span
            class="p-3 w-full text-white font-semibold text-xl rounded-xl hover:bg-gradient-to-r from-[#C026D3] to-[#D946EF]"
          >
            Product
          </span>

          <span
            class="p-3 w-full text-white font-semibold text-xl rounded-xl hover:bg-gradient-to-r from-[#C026D3] to-[#D946EF]"
          >
            Order
          </span>

          <span
            class="p-3 w-full text-white font-semibold text-xl rounded-xl hover:bg-gradient-to-r from-[#C026D3] to-[#D946EF]"
          >
            Users
          </span>
        </div>
        <div class="py-4 px-4 ">
          <button
            class="text-white text-xl bg-gray-600 bg-opacity-50 w-56 rounded-lg py-4 hover:scale-105"
          >
            Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="w-full">
      <!-- Top -->
      <div
        class="w-full bg-white border border-white shadow-md flex items-center space-x-4 p-4"
      >
        <button id="menuButton" class="lg:hidden text-3xl font-bold">☰</button>

        <h2 class="text-2xl opacity-80 font-semibold">Dashboard</h2>

        <!-- Hamburger -->
      </div>

      <div class="px-4 lg:px-10">
        <!-- Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 py-10">
          <div
            class="flex gap-4 bg-white rounded-lg border border-white shadow-lg p-4 py-7"
          >
            <img
              src="image/dollar-sign.png"
              alt="leaf"
              class="bg-green-200 rounded-xl p-3 w-16 h-16"
            />

            <div class="flex flex-col gap-2">
              <span class="text-md opacity-50">Total Sales</span>
              <span class="text-3xl md:text-3xl font-bold">$0.00</span>
            </div>
          </div>

          <div
            class="flex gap-4 bg-white rounded-lg border border-white shadow-lg p-4 py-7"
          >
            <img
              src="image/cart.png"
              alt="leaf"
              class="bg-blue-300 rounded-xl p-3 w-16 h-16"
            />

            <div class="flex flex-col gap-2">
              <span class="text-md opacity-50">Total Orders</span>
              <span class="text-3xl md:text-3xl font-bold">0</span>
            </div>
          </div>

          <div
            class="flex gap-4 bg-white rounded-lg border border-white shadow-lg p-4 py-7"
          >
            <img
              src="image/user.png"
              alt="leaf"
              class="bg-purple-300 bg-opacity-50 rounded-xl p-2 w-16 h-16"
            />

            <div class="flex flex-col gap-2">
              <span class="text-md opacity-50">Customers</span>
              <span class="text-3xl md:text-3xl font-bold">1</span>
            </div>
          </div>

          <div
            class="flex gap-4 bg-white rounded-lg border border-white shadow-lg p-4 py-7"
          >
            <img
              src="image/danger.png"
              alt="leaf"
              class="bg-red-300 bg-opacity-50 rounded-xl p-2 w-16 h-16"
            />

            <div class="flex flex-col gap-2">
              <span class="text-md opacity-50">Low Stock</span>
              <span class="text-3xl md:text-3xl font-bold">0</span>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div
          class="bg-white border border-white shadow-lg rounded-xl overflow-x-auto"
        >
          <div class="flex justify-between py-4 px-4">
            <span class="font-semibold text-xl opacity-80">
              Recent Orders
            </span>

            <span class="font-semibold text-lg text-purple-800">
              View all >>
            </span>
          </div>

          <div
            class="w-full bg-slate-200 rounded-b-xl py-4 pl-4 bg-opacity-45 min-w-[700px]"
          >
            <table class="w-full">
              <tr class="text-left">
                <th class="text-lg opacity-50 font-bold whitespace-nowrap">
                  ORDER ID
                </th>
                <th class="text-lg opacity-50 font-bold whitespace-nowrap">
                  CUSTOMER
                </th>
                <th class="text-lg opacity-50 font-bold whitespace-nowrap">
                  DATE
                </th>
                <th class="text-lg opacity-50 font-bold whitespace-nowrap">
                  TOTAL
                </th>
                <th class="text-lg opacity-50 font-bold whitespace-nowrap">
                  STATUS
                </th>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript -->
    <script>
      const menuButton = document.getElementById("menuButton");
      const closeButton = document.getElementById("closeButton");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      // Open Sidebar
      menuButton.addEventListener("click", () => {
        sidebar.classList.remove("left-[-100%]");
        sidebar.classList.add("left-0");
        overlay.classList.remove("hidden");
      });

      // Close Sidebar
      closeButton.addEventListener("click", closeSidebar);

      // Close when clicking overlay
      overlay.addEventListener("click", closeSidebar);

      function closeSidebar() {
        sidebar.classList.remove("left-0");
        sidebar.classList.add("left-[-100%]");

        overlay.classList.add("hidden");
      }
    </script>
  </body>
</html>
