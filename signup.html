<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadoo Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-blue-100 flex justify-center items-center min-h-screen">
    <div
      class="bg-white rounded-3xl p-8 space-y-7 md:p-8 max-w-md shadow-2xl shadow-gray-700"
    >
      <div class="flex flex-col items-center space-y-5">
        <span class="bg-blue-200 bg-opacity-50 p-4 rounded-xl">
          <img src="login profile.png" alt="loginpf" class="h-10 w-10" />
        </span>
        <div class="space-y-3">
          <h2 class="font-extrabold text-2xl md:text-3xl text-center">
            Create Account
          </h2>
          <p class="text-md md:text-md opacity-70 text-center">
            Join us today! It only takes a minute.
          </p>
        </div>
      </div>
      <form action="" class="space-y-5">
        <!-- name + email -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="flex flex-col">
            <label class="font-bold text-lg pb-2">Full Name</label>
            <input
              type="text"
              value="John Doe"
              class="opacity-50 rounded-lg p-2 border border-gray-500 bg-slate-300 bg-opacity-50 w-full"
            />
          </div>
          <div class="flex flex-col">
            <label class="font-bold text-lg pb-2">Email Address</label>
            <input
              type="text"
              value="name@company.com"
              class="opacity-50 p-2 border border-gray-500 rounded-lg w-full bg-slate-300"
            />
          </div>
        </div>

        <div class="font-bold text-lg">Password</div>
        <input
          type="text"
          value="******"
          class="opacity-50 p-2 border border-gray-500 rounded-lg w-full bg-slate-300"
        />
        <div class="font-bold text-lg">Confirm Password</div>
        <input
          type="text"
          value="******"
          class="opacity-50 p-2 border border-gray-500 rounded-lg w-full bg-slate-300"
        />

        <div class="flex gap-2 text-sm items-center">
          <input type="checkbox" class="" />

          I agree to the
          <p class="text-indigo-600 hover:underline font-semibold">
            Terms of Service
          </p>
          and
          <p class="text-indigo-600 hover:underline font-semibold">
            Privacy Policy
          </p>
        </div>
        <button
          class="bg-indigo-700 w-full text-white py-2 font-semibold rounded-xl"
        >
          Create My Account >>
        </button>
        <div class="flex justify-center space-x-1">
          <p>Already have an account?</p>
          <p class="text-indigo-700 font-semibold">
            <a href="login.html">Sign in here</a>
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
